  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @font-face {
      font-family: 'Alte Haas Grotesk';
      src: local('Alte Haas Grotesk Bold'),
           local('AlteHaasGroteskBold'),
           local('Alte Haas Grotesk');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --green: #769C72;
      --cream: #F3ECDC;
    }

    html, body {
      height: 100%;
      background: var(--green);
      color: var(--cream);
      font-family: 'Alte Haas Grotesk', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── MAIN GRID ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 20px 7vw 20px;
      gap: 4vw;
      overflow: visible;
      min-height: 0;
    }

    /* ── LEFT COL ── */
    .left-col {
      display: flex;
      flex-direction: column;
      justify-content: center;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .headline-block {
      margin-bottom: 1rem;
    }

    /* ── RIGHT CONTENT ── */
    .content {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .brand-lockup {
      margin-top: 3.25rem;
      margin-bottom: 0;
      padding-bottom: 0;
      text-align: left;
    }

    .brand-logo {
      display: block;
      width: 220px;
      max-width: 70vw;
      height: auto;
    }

    .brand-tagline {
      display: block;
      margin-top: 0.75rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0;
      line-height: 1.1;
    }

    .social-links {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 28px;
    }

    .social-link {
      display: flex;
      align-items: center;
      color: var(--cream);
      width: 30px;
      height: 30px;
      transition: color 0.2s;
    }

    .social-link svg,
    .linkedin-icon {
      display: block;
      width: 30px;
      height: 30px;
    }

    .linkedin-icon {
      object-fit: contain;
      border-radius: 4px;
      transition: filter 0.2s;
    }

    .insta-link:hover { color: #383838; }

    .linkedin-link:hover .linkedin-icon {
      filter: brightness(0) saturate(100%) invert(19%) sepia(0%) saturate(0%) hue-rotate(190deg) brightness(95%) contrast(90%);
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0;
      margin-bottom: 2rem;
    }

    .body-text {
      font-size: 1.375rem;
      font-weight: 700;
      line-height: 1.7;
      color: var(--cream);
    }

    .hang-tight {
      display: inline-block;
      margin-top: 2.4rem;
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* ── MARQUEE ── */
    .marquee-col {
      position: relative;
      height: 50vh;
      max-height: 500px;
      overflow: hidden;
    }

    .marquee-track {
      display: flex;
      flex-direction: column;
      animation: marqueeVertical 36s linear infinite;
    }

    .marquee-item {
      font-size: 2.65rem;
      font-weight: 700;
      line-height: 1.15;
      padding: 0.44em 0;
      white-space: nowrap;
      color: var(--cream);
      letter-spacing: 0;
    }

    /* Top & bottom vignette */
    .marquee-col::before,
    .marquee-col::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 30%;
      z-index: 2;
      pointer-events: none;
    }

    .marquee-col::before {
      top: 0;
      background: linear-gradient(to bottom, var(--green) 0%, transparent 100%);
    }

    .marquee-col::after {
      bottom: 0;
      background: linear-gradient(to top, var(--green) 0%, transparent 100%);
    }

    /* ── FOOTER ── */
    footer {
      padding: 10px 7vw;
      text-align: center;
      font-size: 0.78rem;
      color: var(--cream);
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.7s forwards;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes marqueeVertical {
      from { transform: translateY(0); }
      to   { transform: translateY(-50%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .left-col,
      .content,
      footer {
        opacity: 1;
        transform: none;
        animation: none;
      }

      .marquee-track {
        animation: none;
      }
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      body { padding-top: 0; min-height: unset; height: auto; }
      footer { padding-top: 28px; }

      main {
        flex: none;
        grid-template-columns: 1fr;
        padding: 20px 0 0;
        gap: 0;
        align-items: start;
      }

      .left-col {
        display: block;
        padding: 0 6vw;
        width: 100%;
      }

      .headline-block { margin-bottom: 0.5rem; }

      h1 {
        font-size: 3.2rem;
        margin-bottom: 0.8rem;
      }

      .left-col .marquee-col {
        display: block;
        height: 150px;
        max-height: 150px;
        min-height: 0;
        width: 100%;
        overflow: hidden;
        padding: 0;
        flex: none;
      }

      .marquee-col::before,
      .marquee-col::after {
        left: 0; right: 0;
        height: 25%;
        width: auto;
      }

      .marquee-col::before {
        top: 0; bottom: auto;
        background: linear-gradient(to bottom, var(--green) 0%, transparent 100%);
      }

      .marquee-col::after {
        bottom: 0; top: auto;
        background: linear-gradient(to top, var(--green) 0%, transparent 100%);
      }

      .marquee-track {
        flex-direction: column;
        animation: marqueeVertical 36s linear infinite;
        width: auto;
      }

      .marquee-item {
        font-size: 1.4rem;
        font-weight: 400;
        padding: 0.44em 0;
        white-space: nowrap;
      }

      .content {
        display: block;
        padding: 0 6vw;
        margin-top: 20px;
      }

      .brand-lockup { text-align: center; }
      .brand-logo   { width: 190px; margin: 0 auto; }
      .brand-tagline { font-size: 1.25rem; }
      .social-links { justify-content: center; }
      .body-text    { font-size: 1.65rem; }
      .hang-tight   { font-size: 1.6rem; margin-top: 1.2rem; }
    }
  </style>

<body>

  <script>
    const items = [
      "actually enjoy the moment",
      "lose yourself in the music",
      "do whatever you want",
      "make a new best friend",
      "call your mum",
      "don't stand in line like it's 2005",
      "touch up your make-up",
      "catch up with the girls",
      "grab a snack",
      "dance a little more",
      "high five the lads",
      "sit down for a sec",
      "watch another show",
      "text your ex (actually don't)",
      "find your friends",
      "take a photo worth posting",
      "have another drink",
      "catch your breath",
      "get some air",
    ];

    const track = document.getElementById('marqueeTrack');
    const col   = document.getElementById('marqueeCol');
    const reduceMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    let marqueeItems = [];
    let opacityFrame = null;

    if (track && col) {
      [...items, ...items].forEach(text => {
        const div = document.createElement('div');
        div.className = 'marquee-item';
        div.textContent = text;
        track.appendChild(div);
      });

      marqueeItems = Array.from(col.querySelectorAll('.marquee-item'));
      startOpacityLoop();
    }

    function updateOpacity() {
      const colRect  = col.getBoundingClientRect();
      const centreY  = colRect.top + colRect.height / 2;
      const max      = colRect.height / 2 || 1;

      marqueeItems.forEach(item => {
        const r      = item.getBoundingClientRect();
        const itemCY = r.top + r.height / 2;
        const dist   = Math.abs(centreY - itemCY);
        item.style.opacity = 1 - Math.min(dist / max, 1) * 0.82;
      });

      opacityFrame = requestAnimationFrame(updateOpacity);
    }

    function resetOpacity() {
      marqueeItems.forEach(item => {
        item.style.opacity = '';
      });
    }

    function startOpacityLoop() {
      if (opacityFrame || document.hidden || reduceMotionQuery.matches || !col) return;
      opacityFrame = requestAnimationFrame(updateOpacity);
    }

    function stopOpacityLoop() {
      if (!opacityFrame) return;
      cancelAnimationFrame(opacityFrame);
      opacityFrame = null;
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopOpacityLoop();
      } else {
        startOpacityLoop();
      }
    });

    reduceMotionQuery.addEventListener('change', event => {
      if (event.matches) {
        stopOpacityLoop();
        resetOpacity();
      } else {
        startOpacityLoop();
      }
    });
  </script>
