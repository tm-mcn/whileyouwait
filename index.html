<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>whileyouwait — coming soon</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00DDFF;
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #888888;
    }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── MAIN GRID ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 20px 7vw 20px;
      gap: 4vw;
      overflow: visible;
      min-height: 0;
    }

    /* ── LEFT COL ── */
    .left-col {
      display: flex;
      flex-direction: column;
      justify-content: center;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .headline-block {
      margin-bottom: 1rem;
    }

    /* ── RIGHT CONTENT ── */
    .content {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .brand-lockup {
      margin-top: 2rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
    }

    .brand-name {
      display: block;
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      font-weight: 900;
      color: var(--cyan);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .coming-soon {
      display: block;
      font-size: clamp(1.1rem, 2vw, 1.8rem);
      font-weight: 700;
      color: var(--black);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .coming-soon-dot { color: var(--cyan); }

    .insta-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--gray);
      transition: color 0.2s;
    }
    .insta-link:hover { color: var(--cyan); }

    h1 {
      font-size: clamp(2.2rem, 4.5vw, 5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    .body-text {
      font-size: clamp(0.95rem, 1.8vw, 9.2rem);
      font-weight: 400;
      line-height: 1.7;
      color: #333;
    }

    .body-text strong { font-weight: 700; }

    .hang-tight {
      display: inline-block;
      margin-top: 2.4rem;
      font-size: clamp(0.95rem, 1.4vw, 1.1rem);
      font-weight: 700;
    }

    /* ── MARQUEE ── */
    .marquee-col {
      position: relative;
      height: 50vh;
      max-height: 500px;
      overflow: hidden;
    }

    .marquee-track {
      display: flex;
      flex-direction: column;
      animation: marqueeVertical 18s linear infinite;
    }

    .marquee-item {
      font-size: clamp(1.6rem, 3vw, 3.5rem);
      font-weight: 900;
      line-height: 1.15;
      padding: 0.44em 0;
      white-space: nowrap;
      color: var(--black);
      letter-spacing: -0.02em;
    }

    /* Top & bottom vignette */
    .marquee-col::before,
    .marquee-col::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 30%;
      z-index: 2;
      pointer-events: none;
    }

    .marquee-col::before {
      top: 0;
      background: linear-gradient(to bottom, var(--white) 0%, transparent 100%);
    }

    .marquee-col::after {
      bottom: 0;
      background: linear-gradient(to top, var(--white) 0%, transparent 100%);
    }

    /* ── FOOTER ── */
    footer {
      padding: 10px 7vw;
      text-align: center;
      font-size: 0.78rem;
      color: var(--gray);
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.7s forwards;
    }

    .social-icons {
      display: flex;
      justify-content: flex-start;
      gap: 12px;
      margin-top: 6px;
    }

    .social-icons a {
      color: var(--gray);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .social-icons a:hover { color: var(--cyan); }

    .social-icons svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      display: block;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes marqueeVertical {
      from { transform: translateY(0); }
      to   { transform: translateY(-50%); }
    }

    @keyframes marqueeHorizontal {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      body { padding-top: 0; min-height: unset; height: auto; }
      main { flex: none; }

      main {
        grid-template-columns: 1fr;
        padding: 20px 0 32px;
        gap: 0;
        align-items: start;
      }

      .left-col {
        display: block;
        padding: 0 6vw;
        width: 100%;
      }

      .headline-block { margin-bottom: 0.5rem; }

      h1 {
        font-size: 3.2rem;
        margin-bottom: 0.8rem;
      }

      /* Force marquee to exactly 150px — no stretching */
      .left-col .marquee-col {
        display: block;
        height: 150px !important;
        max-height: 150px !important;
        min-height: 0 !important;
        width: 100%;
        overflow: hidden;
        padding: 0;
        flex: none;
      }

      .marquee-col::before,
      .marquee-col::after {
        left: 0; right: 0;
        height: 25%;
        width: auto;
      }

      .marquee-col::before {
        top: 0; bottom: auto;
        background: linear-gradient(to bottom, var(--white) 0%, transparent 100%);
      }

      .marquee-col::after {
        bottom: 0; top: auto;
        background: linear-gradient(to top, var(--white) 0%, transparent 100%);
      }

      .marquee-track {
        flex-direction: column;
        animation: marqueeVertical 18s linear infinite;
        width: auto;
      }

      .marquee-item {
        font-size: 1.4rem;
        padding: 0.44em 0;
        white-space: nowrap;
      }

      .content {
        display: block;
        padding: 0 6vw;
        margin-top: 20px;
      }

      .brand-name   { font-size: 1.5rem; }
      .coming-soon  { font-size: 1.3rem; }
      .body-text    { font-size: 1.15rem; }
      .hang-tight   { font-size: 1.15rem; margin-top: 1.6rem; }
    }
  </style>
</head>
<body>

  <main>
    <!-- LEFT: headline + marquee -->
    <div class="left-col">
      <div class="headline-block">
        <h1>while you wait...</h1>
      </div>
      <div class="marquee-col" id="marqueeCol">
        <div class="marquee-track" id="marqueeTrack"></div>
      </div>
    </div>

    <!-- RIGHT: body copy + hang tight + brand lockup -->
    <div class="content">
      <p class="body-text">
        the average person spends four and a half years<br>
        of their life standing in queues.<br>
        we think that's <strong>silly</strong>.<br>
        so we built something better.
      </p>
      <span class="hang-tight">good things come to those who <span style="text-decoration:underline;">don't</span> wait.</span>
      <div class="brand-lockup">
        <span class="brand-name">whileyouwait</span>
        <span class="coming-soon">coming soon<span class="coming-soon-dot">.</span></span>
        <a href="https://www.instagram.com/whileyouwait.io?igsh=bW0xNXQza3UyeWl6" aria-label="Instagram" target="_blank" rel="noopener" class="insta-link">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="20" height="20" style="display:block;fill:currentColor;">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
        </a>
      </div>
    </div>
  </main>

  <footer>
    <div>built for the impatient.</div>
    <div>© whileyouwait 2026</div>

  </footer>

  <script>
    const items = [
      "touch up your make-up",
      "don't stand in line like it's 2005",
      "call your mum",
      "doomscroll tiktok",
      "catch up with the girls",
      "slide into someone's DMs",
      "high five the lads",
      "grab a snack",
      "watch a show",
      "dance a little more",
      "find your friends",
      "do something else",
    ];

    const track = document.getElementById('marqueeTrack');
    const col   = document.getElementById('marqueeCol');

    // Duplicate for seamless infinite loop
    [...items, ...items].forEach(text => {
      const div = document.createElement('div');
      div.className = 'marquee-item';
      div.textContent = text;
      track.appendChild(div);
    });

    // Opacity fade based on distance from centre (vertical on desktop, horizontal on mobile)
    function updateOpacity() {
      const isMobile = window.innerWidth <= 640;
      const colRect  = col.getBoundingClientRect();
      const centreX  = colRect.left + colRect.width / 2;
      const centreY  = colRect.top + colRect.height / 2;

      col.querySelectorAll('.marquee-item').forEach(item => {
        const r      = item.getBoundingClientRect();
        const itemCY = r.top + r.height / 2;
        const dist   = Math.abs(centreY - itemCY);
        const max    = colRect.height / 2;
        item.style.opacity = 1 - Math.min(dist / max, 1) * 0.82;
      });
      requestAnimationFrame(updateOpacity);
    }

    requestAnimationFrame(updateOpacity);
  </script>

</body>
</html>
